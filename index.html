<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: white; }
        .box { border: 2px solid #4CAF50; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #ccc; }
        #result { margin-top: 20px; font-weight: bold; color: #2e7d32; font-size: 18px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <h3 id="status" style="color: #f57c00;">⏳ Loading Local AI Model...</h3>
    <input type="file" id="imageUpload" accept="image/*" disabled>
    <img id="preview" src="">
    <button id="predictBtn" onclick="predict()" disabled>Scan Crop</button>
    <div id="result"></div>
</div>

<script>
    let model;

    async function init() {
        try {
            // This now loads the files directly from your GitHub folder
            model = await tmImage.load("model[1].json", "metadata[1].json");
            
            document.getElementById("status").innerText = "✅ AI Ready";
            document.getElementById("status").style.color = "green";
            document.getElementById("imageUpload").disabled = false;
            document.getElementById("predictBtn").disabled = false;
        } catch (e) {
            document.getElementById("status").innerText = "❌ Error: Files not found in GitHub";
            console.error(e);
        }
    }

    document.getElementById("imageUpload").onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const img = document.getElementById("preview");
            img.src = reader.result;
            img.style.display = "block";
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    async function predict() {
        const img = document.getElementById("preview");
        const prediction = await model.predict(img);
        
        let best = { className: "", probability: 0 };
        prediction.forEach(p => { if(p.probability > best.probability) best = p; });

        document.getElementById("result").innerText = 
            "Diagnosis: " + best.className + "\nConfidence: " + (best.probability * 100).toFixed(1) + "%";
    }

    init();
</script>
</body>
</html>
