<!DOCTYPE html>
<html>
<head>
  <title>Crop Disease Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
</head>

<body>

<h2>🌿 Crop Disease Detection</h2>

<input type="file" id="imageUpload" accept="image/*" capture="environment"><br><br>

<button onclick="predict()">Detect Disease</button>

<p id="result"></p>

<script>
let model;

async function loadModel() {
  const URL = "https://teachablemachine.withgoogle.com/models/29h6ZXFNb/";
  model = await tmImage.load(URL + "model.json", URL + "metadata.json");
}

async function predict() {

  if (!model) {
    alert("Model not loaded yet, wait few seconds");
    return;
  }

  const file = document.getElementById("imageUpload").files[0];

  if (!file) {
    alert("Please upload image");
    return;
  }

  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);

  await img.decode();

  const prediction = await model.predict(img);

  console.log(prediction); // 🔥 check in console

  let highest = prediction[0];

  for (let i = 1; i < prediction.length; i++) {
    if (prediction[i].probability > highest.probability) {
      highest = prediction[i];
    }
  }

  showResult(highest.className);
}
  function showResult(disease) {

  let solution = "";

  if (disease.includes("Bacterial_spot")) {
    solution = "Use Copper fungicide";
  }
  else if (disease.includes("Early_blight")) {
    solution = "Use Mancozeb spray";
  }
  else if (disease.includes("Late_blight")) {
    solution = "Use Metalaxyl";
  }
  else if (disease.includes("Leaf_Mold")) {
    solution = "Use Neem oil";
  }
  else if (disease.includes("Spider_mites")) {
    solution = "Use insecticide spray";
  }
  else if (disease.includes("Target_Spot")) {
    solution = "Use fungicide";
  }
  else if (disease.includes("Yellow_Leaf_Curl")) {
    solution = "Control whiteflies";
  }
  else if (disease.includes("healthy")) {
    solution = "Plant is healthy ✅";
  }

  document.getElementById("result").innerHTML =
    "🌿 Disease: " + disease + "<br>💊 Solution: " + solution;
}

loadModel();
</script>

</body>
</html>
