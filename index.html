<script>
let model;

const URL = "https://teachablemachine.withgoogle.com/models/G4k3xOZxd/";

async function loadModel() {
    try {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        console.log("Model Loaded Successfully");
    } catch (error) {
        alert("Model failed to load. Check internet or link.");
        console.error(error);
    }
}

loadModel();

async function predict() {
    if (!model) {
        alert("Model still loading...");
        return;
    }

    const fileInput = document.getElementById("imageUpload");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please upload image");
        return;
    }

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    img.onload = async function () {
        const prediction = await model.predict(img);

        let result = "";
        let maxProb = 0;

        for (let i = 0; i < prediction.length; i++) {
            if (prediction[i].probability > maxProb) {
                maxProb = prediction[i].probability;
                result = prediction[i].className;
            }
        }

        document.getElementById("result").innerText = 
            "Prediction: " + result + " (" + (maxProb * 100).toFixed(2) + "%)";
    };
}
</script>
